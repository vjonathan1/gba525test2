<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBA 525 Test 2 Master Quiz - Animated</title>
<style>
    body {
        font-family: 'Moderat-Regular', sans-serif;
        background-color: #eef2f5;
        color: #2c3e50;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .quiz-app {
        background: #ffffff;
        width: 100%;
        max-width: 650px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 90vh;
        position: relative;
    }
    .header {
        background: #002d72;
        color: white;
        padding: 25px 20px;
        text-align: left;
        position: relative;
    }
    .header h2 {
        margin: 0;
        font-size: 1.4em;
    }
    .stats-tracker {
        position: absolute;
        top: 25px;
        right: 20px;
        display: flex;
        gap: 10px;
        font-size: 0.9em;
    }
    .stat-badge {
        background: rgba(255, 255, 255, 0.15);
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: bold;
        backdrop-filter: blur(5px);
    }
    .stat-correct { color: #a8e6cf; border: 1px solid rgba(168, 230, 207, 0.3); }
    .stat-incorrect { color: #ffaaa5; border: 1px solid rgba(255, 170, 165, 0.3); }
    
    .progress-bar {
        height: 6px;
        background: #ecf0f1;
    }
    .progress-fill {
        height: 100%;
        background: #3498db;
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .question-container {
        padding: 30px;
        overflow-y: auto;
        flex-grow: 1;
    }
    .fade-enter {
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 0.5s forwards ease-out;
    }
    @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
    }
    .question-text {
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 25px;
        line-height: 1.4;
    }
    .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .option-btn {
        background: #f8f9fa;
        border: 2px solid #e9ecef;
        padding: 14px 18px;
        border-radius: 10px;
        font-size: 1em;
        font-family: inherit;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
    }
    .option-btn:hover:not(:disabled) {
        background: #e2e6ea;
        border-color: #dae0e5;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .option-btn.correct {
        background: #d4edda;
        border-color: #28a745;
        color: #155724;
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .option-btn.incorrect {
        background: #f8d7da;
        border-color: #dc3545;
        color: #721c24;
        animation: shake 0.4s ease-in-out;
    }
    @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
    }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
    }
    .option-btn:disabled {
        cursor: not-allowed;
        opacity: 0.8;
    }
    .feedback-container {
        margin-top: 25px;
        padding: 18px;
        border-radius: 10px;
        display: none;
        font-size: 0.95em;
        line-height: 1.5;
        opacity: 0;
        transform: scale(0.95);
        transition: all 0.3s ease;
    }
    .feedback-container.show {
        display: block;
        opacity: 1;
        transform: scale(1);
    }
    .feedback-container.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 5px solid #4caf50;
    }
    .feedback-container.error {
        background: #ffebee;
        color: #c62828;
        border-left: 5px solid #ef5350;
    }
    .controls {
        padding: 18px 30px;
        background: #f8f9fa;
        text-align: right;
        border-top: 1px solid #e9ecef;
    }
    .next-btn {
        background: #002d72;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1em;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        display: none;
        transition: background 0.2s, transform 0.1s;
    }
    .next-btn:hover {
        background: #001f50;
        transform: translateY(-1px);
    }
    .next-btn:active {
        transform: translateY(1px);
    }
    .end-screen {
        text-align: center;
        padding: 50px 30px;
        display: none;
        animation: fadeInUp 0.6s ease-out;
    }
    .end-screen h2 {
        color: #002d72;
        font-size: 2em;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="quiz-app">
    <div class="header" id="quiz-header">
        <h2>GBA 525: Test 2</h2>
        <div class="stats-tracker">
            <div class="stat-badge stat-correct"><span id="score-correct">0</span> Right</div>
            <div class="stat-badge stat-incorrect"><span id="score-incorrect">0</span> Wrong</div>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    
    <div class="question-container" id="q-container">
        <div id="anim-wrapper" class="fade-enter">
            <div class="question-text" id="question-text">Loading question...</div>
            <div class="options" id="options-container"></div>
            <div class="feedback-container" id="feedback"></div>
        </div>
    </div>

    <div class="end-screen" id="end-screen">
        <h2>Quiz Complete!</h2>
        <p style="font-size: 1.2em;">You got <strong id="final-score" style="color:#28a745;"></strong> right and <strong id="final-wrong" style="color:#dc3545;"></strong> wrong out of <span id="total-qs"></span>.</p>
        <button class="next-btn" style="display:inline-block; margin-top: 25px;" onclick="location.reload()">Start a New Round</button>
    </div>

    <div class="controls" id="controls">
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>
</div>

<script>
    const allQuestions = [
        { q: "What level of strategy determines a firm's strategic position in its quest for competitive advantage when competing in a single industry or product market?", options: ["Corporate Strategy", "Business-Level Strategy", "Functional Strategy", "Platform Strategy"], a: 1, feedback: "Business-level strategy focuses on how to compete in a single product market." },
        { q: "Strategic positioning requires managers to address strategic trade-offs that arise between what two factors?", options: ["Scale and Scope", "Value and Cost", "Differentiation and Innovation", "Tangible and Intangible Resources"], a: 1, feedback: "Strategic trade-offs arise between value and cost, because higher value tends to correspond with higher cost." },
        { q: "What is the primary goal of a differentiation strategy?", options: ["Decrease unit cost", "Increase perceived value so customers pay a higher price", "Match external producers and consumers", "Combine two independent firms"], a: 1, feedback: "The focus is on value-enhancing attributes and features to command a premium price." },
        { q: "Product features, customer service, customization, and complements are examples of what?", options: ["Value Drivers", "Core Competencies", "Cost Drivers", "Economies of Scope"], a: 0, feedback: "These are unique value drivers that managers can manipulate to differentiate their offerings." },
        { q: "A decrease in unit cost as output increases is known as what?", options: ["Economies of Scope", "Economies of Scale", "Learning Curve Effects", "Experience Curve Effects"], a: 1, feedback: "Economies of Scale occur when high volumes lower the per-unit cost." },
        { q: "Savings that come from producing two or more outputs at less cost than producing each output individually, despite using the same resources, are called:", options: ["Value Innovation", "Economies of Scale", "Economies of Scope", "Network Effects"], a: 2, feedback: "Economies of Scope involve leveraging resources across multiple products." },
        { q: "A business-level strategy that successfully combines differentiation and cost leadership activities using value innovation is called:", options: ["Platform Strategy", "Blue Ocean Strategy", "Taper Integration", "Architectural Innovation"], a: 1, feedback: "Blue Ocean Strategy reconciles the inherent trade-offs between differentiation and low cost." },
        { q: "What graphical depiction shows a company's relative performance against competitors across the industry's key success factors?", options: ["BCG Matrix", "Smile Strategy", "Strategy Canvas", "Four Actions Framework"], a: 2, feedback: "The Strategy Canvas visually maps out how a firm compares to its rivals on specific industry factors." },
        { q: "What are the five stages of the Industry Life Cycle?", options: ["Intro, Growth, Shakeout, Maturity, Decline", "Idea, Launch, Growth, Peak, Obsolescence", "Eliminate, Reduce, Raise, Create, Maintain", "Introduction, Chasm, Majority, Laggards, Decline"], a: 0, feedback: "The Industry Life Cycle consists of Introduction, Growth, Shakeout, Maturity, and Decline." },
        { q: "What term describes the process where legacy firms risk being destroyed by new creative entrants due to innovation?", options: ["Creative Destruction", "Crossing the Chasm", "Managerial Hubris", "Opportunism"], a: 0, feedback: "Creative destruction occurs as innovation takes place, forcing legacy firms to adapt or be destroyed." },
        { q: "A framework based on the idea that each segment of the industry life cycle is dominated by a different customer segment is called:", options: ["Build-Borrow-Buy", "Industry Life Cycle", "Crossing the Chasm", "Value Innovation"], a: 2, feedback: "Crossing the Chasm highlights the difficulty (the 'gulf') of moving from early adopters to the early majority." },
        { q: "Combining new technologies with a new market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 0, feedback: "Radical innovation is a completely new approach in a completely new market." },
        { q: "Introducing a new technology into an existing market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 3, feedback: "Disruptive Innovation leverages new technologies to compete in existing markets, often starting at the low end." },
        { q: "Combining existing technologies with a new market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 1, feedback: "Architectural innovation reconfigures known components to create new markets." },
        { q: "Improving existing technologies in an existing market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 2, feedback: "Incremental innovation steadily improves an established product." },
        { q: "An enterprise that creates value by matching external producers and consumers via an infrastructure it manages is a:", options: ["Joint Venture", "Platform Business", "Taper Integration", "Strategic Alliance"], a: 1, feedback: "A Platform Business relies on network effects to bring producers and consumers together." },
        { q: "Decisions leaders make in their quest for competitive advantage in several industries and markets simultaneously is called:", options: ["Business Strategy", "Corporate Strategy", "Functional Strategy", "Blue Ocean Strategy"], a: 1, feedback: "Corporate strategy involves deciding WHERE to compete across industries, value chains, and geographies." },
        { q: "A behavior characterized by self-interest seeking with guile, such as a 'hold up', is known as:", options: ["Managerial Hubris", "Asymmetrical Information", "Opportunism", "Path Dependence"], a: 2, feedback: "Opportunism occurs when one party withholds cooperation to gain bargaining power." },
        { q: "A situation in which one party possesses private information and is therefore more informed than another party is called:", options: ["Managerial Hubris", "Opportunism", "Asymmetrical Information", "Tacit Knowledge"], a: 2, feedback: "Asymmetrical information is common in transaction costs when one party has more data than the other." },
        { q: "A firm that is backwardly integrated but also relies on outside market firms for some of its supplies is utilizing:", options: ["Horizontal Diversification", "Taper Integration", "Joint Ventures", "Unrelated Diversification"], a: 1, feedback: "Taper Integration orchestrates value activities by mixing in-house operations with outside suppliers or distributors." },
        { q: "When a firm derives revenues from a mixture of businesses that are linked to its primary business activity, it is using:", options: ["Taper Integration", "Unrelated Diversification", "Related Diversification", "Joint Venture"], a: 2, feedback: "Related diversification leverages existing competencies across linked business units." },
        { q: "When the mixture of businesses that drive revenue for a firm share few linkages between them, it is using:", options: ["Related Diversification", "Unrelated Diversification", "Taper Integration", "Architectural Innovation"], a: 1, feedback: "Unrelated diversification involves competing in completely different industries." },
        { q: "In the BCG Matrix, what is a business unit with high relative market share and high market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 0, feedback: "A Star requires heavy investment but holds a dominant position in a growing market." },
        { q: "In the BCG Matrix, what is a business unit with high relative market share but low market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 1, feedback: "A Cash Cow generates significant revenue that can be invested elsewhere." },
        { q: "In the BCG Matrix, what is a business unit with low relative market share but high market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 2, feedback: "A Question Mark requires significant cash to grow its low market share in a rapidly expanding industry." },
        { q: "In the BCG Matrix, what is a business unit with low relative market share and low market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 3, feedback: "A Dog typically does not generate much cash and may be divested." },
        { q: "What framework helps firms determine whether to pursue internal development, contractual agreements, or acquire new resources?", options: ["Four Actions Framework", "Build-Borrow-Buy", "SOAR Model", "BCG Matrix"], a: 1, feedback: "The Build-Borrow-Buy framework asks questions about Relevance, Tradability, Closeness, and Integration." },
        { q: "What treats decision making like stock options, breaking a larger decision into a set of smaller decisions over time?", options: ["Real-Options Perspective", "Build-Borrow-Buy Framework", "SOAR Model", "Platform Strategy"], a: 0, feedback: "The Real-Options Perspective gives the firm the right, but not the obligation, to continue making investments." },
        { q: "Voluntary arrangements between firms that involve the sharing of knowledge, resources, and capabilities are called:", options: ["Mergers", "Acquisitions", "Strategic Alliances", "Platform Businesses"], a: 2, feedback: "Strategic alliances include non-equity alliances, equity alliances, and joint ventures." },
        { q: "What type of alliance involves the creation of an entirely new entity and is the strongest form of strategic alliance?", options: ["Non-equity Alliance", "Equity Alliance", "Joint Venture", "Platform Business"], a: 2, feedback: "Joint Ventures involve creating a separate, legally independent entity and represent a long-term commitment." },
        { q: "Knowledge that cannot be codified and concerns knowing 'how' to do a task through active participation is:", options: ["Asymmetrical Information", "Tacit Knowledge", "Explicit Knowledge", "Core Competency"], a: 1, feedback: "Tacit Knowledge requires strong ties, like an equity alliance or joint venture, to transfer effectively." },
        { q: "When managers convince themselves of their superior skills in the face of clear evidence to the contrary (often justifying bad M&As), it is called:", options: ["Confirmation Bias", "Opportunism", "Managerial Hubris", "The Ostrich Effect"], a: 2, feedback: "Managerial Hubris is a form of self-delusion where leaders believe they are the exception to the rule that M&As destroy value." },
        { q: "According to the textbook, what happens to shareholder value in the majority of Mergers and Acquisitions?", options: ["It drastically increases", "It is destroyed", "It remains completely neutral", "It only increases for the acquiring firm"], a: 1, feedback: "Most M&As destroy shareholder value, and any value created generally goes to the firm being taken over." },
        { q: "In the Four Actions Framework, what factor asks which elements an industry takes for granted and should be dropped entirely?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 1, feedback: "Eliminate removes factors that no longer add value." },
        { q: "In the Four Actions Framework, what factor asks which elements should be lowered well below the industry standard?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 0, feedback: "Reduce lowers factors to save costs." },
        { q: "In the Four Actions Framework, what factor asks which elements should be elevated well above the industry standard?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 2, feedback: "Raise increases factors to boost buyer value." },
        { q: "In the Four Actions Framework, what factor asks which elements the industry has never offered before?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 3, feedback: "Create introduces entirely new value propositions." },
        { q: "In the Blue Ocean Model, where is Value Innovation created?", options: ["Where costs increase and buyer value increases", "Where costs decrease and buyer value increases", "Where costs decrease and buyer value decreases", "Where technology outpaces the market standard"], a: 1, feedback: "Value innovation occurs in the region where a company’s actions simultaneously lower costs and lift buyer value." },
        { q: "Which way of thinking strategically asks 'how', breaks things apart, and goes down the funnel?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 0, feedback: "Analytical thinking is great for red oceans but bad for creativity." },
        { q: "Which way of thinking strategically asks 'Who doesn't know this already?' and sees connections others overlook?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 1, feedback: "Second-Level Thinking involves creative insights and interpreting data in unconventional ways." },
        { q: "Which way of thinking strategically embraces 'Negative Capability' and takes the competitor's point of view?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 2, feedback: "180-Degree Thinking requires humility and the ability to hold two opposed ideas in mind." },
        { q: "Which way of thinking strategically looks at the 'why', goes up the funnel, and focuses on purpose?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 3, feedback: "Systems Thinking evaluates the overall role and purpose of a company within its broader industry." },
        { q: "According to Handy’s Clover, which of the following is NOT one of the three distinct parts used to explain outsourcing?", options: ["Professional Core", "Self-Employed Professionals", "Contingent Workforce", "Platform Ecosystem"], a: 3, feedback: "Handy's Clover (Shamrock Organisation) consists of the Professional Core, Self-Employed Professionals, and the Contingent Workforce." },
        { q: "According to the Smile Strategy (or Smiley Strategy), which process sits in the middle 'dip' because it has the lowest value added?", options: ["Engineering and Design", "Marketing and Supply Chain", "Assembly", "Customer Service"], a: 2, feedback: "In the Smile Strategy, the ends (engineering/design and marketing) have high value added, while the middle (assembly) dips down." },
        { q: "What does the 'A' stand for in the SOAR model?", options: ["Actions", "Aspirations", "Alliances", "Asymmetry"], a: 1, feedback: "SOAR stands for Strengths, Opportunities, Aspirations, Results." },
        { q: "What strategic tool evaluates a company's competitive position by assigning importance to various Success Factors and comparing performance against competitors?", options: ["SOAR Model", "Weighted Competitive Strength Assessment", "BCG Matrix", "Four Actions Framework"], a: 1, feedback: "The Weighted Competitive Strength Assessment mathematically compares firms based on key success factors." },
        { q: "Which type of company is described as the incumbents who built and dominate the industry orthodoxy?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 0, feedback: "Rule Makers create the rules that others follow." },
        { q: "Which type of company is described as paying homage to the industrial lords?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 1, feedback: "Rule Takers follow the established rules of the game." },
        { q: "Which type of company is described as malcontents and revolutionaries who want to overturn the industrial order?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 2, feedback: "Rule Breakers change the rules of the game to create new market spaces." }
    ];

    let currentQIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;
    let shuffledQuestions = [];

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function initQuiz() {
        shuffledQuestions = shuffleArray([...allQuestions]); 
        document.getElementById('total-qs').innerText = shuffledQuestions.length;
        loadQuestion();
    }

    function loadQuestion() {
        // Reset animation
        const animWrapper = document.getElementById('anim-wrapper');
        animWrapper.classList.remove('fade-enter');
        void animWrapper.offsetWidth; // trigger reflow
        animWrapper.classList.add('fade-enter');

        const qObj = shuffledQuestions[currentQIndex];
        document.getElementById('question-text').innerText = `Question ${currentQIndex + 1} of ${shuffledQuestions.length}: \n${qObj.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.className = 'feedback-container';
        document.getElementById('next-btn').style.display = 'none';

        let optionsWithIndex = qObj.options.map((opt, i) => ({ text: opt, originalIndex: i }));
        let shuffledOpts = shuffleArray(optionsWithIndex);

        shuffledOpts.forEach((optObj) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optObj.text;
            btn.onclick = () => selectAnswer(btn, optObj.originalIndex, qObj.a, qObj.feedback, shuffledOpts);
            optionsContainer.appendChild(btn);
        });

        const progressPct = ((currentQIndex) / shuffledQuestions.length) * 100;
        document.getElementById('progress').style.width = progressPct + '%';
    }

    function selectAnswer(selectedBtn, selectedIndex, correctIndex, feedbackText, shuffledOpts) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true); 

        const feedbackDiv = document.getElementById('feedback');
        
        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add('correct');
            correctCount++;
            document.getElementById('score-correct').innerText = correctCount;
            feedbackDiv.innerHTML = `<strong>Correct!</strong> ${feedbackText}`;
            feedbackDiv.className = 'feedback-container show success';
        } else {
            selectedBtn.classList.add('incorrect');
            incorrectCount++;
            document.getElementById('score-incorrect').innerText = incorrectCount;
            
            allBtns.forEach((btn, idx) => {
                if(shuffledOpts[idx].originalIndex === correctIndex) {
                    btn.classList.add('correct');
                }
            });
            feedbackDiv.innerHTML = `<strong>Incorrect.</strong> ${feedbackText}`;
            feedbackDiv.className = 'feedback-container show error';
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('quiz-header').style.display = 'none';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('q-container').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        
        const endScreen = document.getElementById('end-screen');
        endScreen.style.display = 'block';
        document.getElementById('final-score').innerText = correctCount;
        document.getElementById('final-wrong').innerText = incorrectCount;
    }

    window.onload = initQuiz;
</script>
</body>
</html>
