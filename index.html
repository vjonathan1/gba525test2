<script>
    const allQuestions = [
        { q: "What level of strategy determines a firm's strategic position in its quest for competitive advantage when competing in a single industry or product market?", options: ["Corporate Strategy", "Business-Level Strategy", "Functional Strategy", "Platform Strategy"], a: 1, feedback: "Business-level strategy focuses on how to compete in a single product market." },
        { q: "Strategic positioning requires managers to address strategic trade-offs that arise between what two factors?", options: ["Scale and Scope", "Value and Cost", "Differentiation and Innovation", "Tangible and Intangible Resources"], a: 1, feedback: "Strategic trade-offs arise between value and cost, because higher value tends to correspond with higher cost." },
        { q: "What is the primary goal of a differentiation strategy?", options: ["Decrease unit cost", "Increase perceived value so customers pay a higher price", "Match external producers and consumers", "Combine two independent firms"], a: 1, feedback: "The focus is on value-enhancing attributes and features to command a premium price." },
        { q: "Product features, customer service, customization, and complements are examples of what?", options: ["Value Drivers", "Core Competencies", "Cost Drivers", "Economies of Scope"], a: 0, feedback: "These are unique value drivers that managers can manipulate to differentiate their offerings." },
        { q: "A decrease in unit cost as output increases is known as what?", options: ["Economies of Scope", "Economies of Scale", "Learning Curve Effects", "Experience Curve Effects"], a: 1, feedback: "Economies of Scale occur when high volumes lower the per-unit cost." },
        { q: "Savings that come from producing two or more outputs at less cost than producing each output individually, despite using the same resources, are called:", options: ["Value Innovation", "Economies of Scale", "Economies of Scope", "Network Effects"], a: 2, feedback: "Economies of Scope involve leveraging resources across multiple products." },
        { q: "A business-level strategy that successfully combines differentiation and cost leadership activities using value innovation is called:", options: ["Platform Strategy", "Blue Ocean Strategy", "Taper Integration", "Architectural Innovation"], a: 1, feedback: "Blue Ocean Strategy reconciles the inherent trade-offs between differentiation and low cost." },
        { q: "What graphical depiction shows a company's relative performance against competitors across the industry's key success factors?", options: ["BCG Matrix", "Smile Strategy", "Strategy Canvas", "Four Actions Framework"], a: 2, feedback: "The Strategy Canvas visually maps out how a firm compares to its rivals on specific industry factors." },
        { q: "What are the five stages of the Industry Life Cycle?", options: ["Intro, Growth, Shakeout, Maturity, Decline", "Idea, Launch, Growth, Peak, Obsolescence", "Eliminate, Reduce, Raise, Create, Maintain", "Introduction, Chasm, Majority, Laggards, Decline"], a: 0, feedback: "The Industry Life Cycle consists of Introduction, Growth, Shakeout, Maturity, and Decline." },
        { q: "What term describes the process where legacy firms risk being destroyed by new creative entrants due to innovation?", options: ["Creative Destruction", "Crossing the Chasm", "Managerial Hubris", "Opportunism"], a: 0, feedback: "Creative destruction occurs as innovation takes place, forcing legacy firms to adapt or be destroyed." },
        { q: "A framework based on the idea that each segment of the industry life cycle is dominated by a different customer segment is called:", options: ["Build-Borrow-Buy", "Industry Life Cycle", "Crossing the Chasm", "Value Innovation"], a: 2, feedback: "Crossing the Chasm highlights the difficulty (the 'gulf') of moving from early adopters to the early majority." },
        { q: "Combining new technologies with a new market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 0, feedback: "Radical innovation is a completely new approach in a completely new market." },
        { q: "Introducing a new technology into an existing market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 3, feedback: "Disruptive Innovation leverages new technologies to compete in existing markets, often starting at the low end." },
        { q: "Combining existing technologies with a new market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 1, feedback: "Architectural innovation reconfigures known components to create new markets." },
        { q: "Improving existing technologies in an existing market is considered what type of innovation?", options: ["Radical", "Architectural", "Incremental", "Disruptive"], a: 2, feedback: "Incremental innovation steadily improves an established product." },
        { q: "An enterprise that creates value by matching external producers and consumers via an infrastructure it manages is a:", options: ["Joint Venture", "Platform Business", "Taper Integration", "Strategic Alliance"], a: 1, feedback: "A Platform Business relies on network effects to bring producers and consumers together." },
        { q: "Decisions leaders make in their quest for competitive advantage in several industries and markets simultaneously is called:", options: ["Business Strategy", "Corporate Strategy", "Functional Strategy", "Blue Ocean Strategy"], a: 1, feedback: "Corporate strategy involves deciding WHERE to compete across industries, value chains, and geographies." },
        { q: "A behavior characterized by self-interest seeking with guile, such as a 'hold up', is known as:", options: ["Managerial Hubris", "Asymmetrical Information", "Opportunism", "Path Dependence"], a: 2, feedback: "Opportunism occurs when one party withholds cooperation to gain bargaining power." },
        { q: "A situation in which one party possesses private information and is therefore more informed than another party is called:", options: ["Managerial Hubris", "Opportunism", "Asymmetrical Information", "Tacit Knowledge"], a: 2, feedback: "Asymmetrical information is common in transaction costs when one party has more data than the other." },
        { q: "A firm that is backwardly integrated but also relies on outside market firms for some of its supplies is utilizing:", options: ["Horizontal Diversification", "Taper Integration", "Joint Ventures", "Unrelated Diversification"], a: 1, feedback: "Taper Integration orchestrates value activities by mixing in-house operations with outside suppliers or distributors." },
        { q: "When a firm derives revenues from a mixture of businesses that are linked to its primary business activity, it is using:", options: ["Taper Integration", "Unrelated Diversification", "Related Diversification", "Joint Venture"], a: 2, feedback: "Related diversification leverages existing competencies across linked business units." },
        { q: "When the mixture of businesses that drive revenue for a firm share few linkages between them, it is using:", options: ["Related Diversification", "Unrelated Diversification", "Taper Integration", "Architectural Innovation"], a: 1, feedback: "Unrelated diversification involves competing in completely different industries." },
        { q: "In the BCG Matrix, what is a business unit with high relative market share and high market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 0, feedback: "A Star requires heavy investment but holds a dominant position in a growing market." },
        { q: "In the BCG Matrix, what is a business unit with high relative market share but low market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 1, feedback: "A Cash Cow generates significant revenue that can be invested elsewhere." },
        { q: "In the BCG Matrix, what is a business unit with low relative market share but high market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 2, feedback: "A Question Mark requires significant cash to grow its low market share in a rapidly expanding industry." },
        { q: "In the BCG Matrix, what is a business unit with low relative market share and low market growth called?", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 3, feedback: "A Dog typically does not generate much cash and may be divested." },
        { q: "What framework helps firms determine whether to pursue internal development, contractual agreements, or acquire new resources?", options: ["Four Actions Framework", "Build-Borrow-Buy", "SOAR Model", "BCG Matrix"], a: 1, feedback: "The Build-Borrow-Buy framework asks questions about Relevance, Tradability, Closeness, and Integration." },
        { q: "What treats decision making like stock options, breaking a larger decision into a set of smaller decisions over time?", options: ["Real-Options Perspective", "Build-Borrow-Buy Framework", "SOAR Model", "Platform Strategy"], a: 0, feedback: "The Real-Options Perspective gives the firm the right, but not the obligation, to continue making investments." },
        { q: "Voluntary arrangements between firms that involve the sharing of knowledge, resources, and capabilities are called:", options: ["Mergers", "Acquisitions", "Strategic Alliances", "Platform Businesses"], a: 2, feedback: "Strategic alliances include non-equity alliances, equity alliances, and joint ventures." },
        { q: "What type of alliance involves the creation of an entirely new entity and is the strongest form of strategic alliance?", options: ["Non-equity Alliance", "Equity Alliance", "Joint Venture", "Platform Business"], a: 2, feedback: "Joint Ventures involve creating a separate, legally independent entity and represent a long-term commitment." },
        { q: "Knowledge that cannot be codified and concerns knowing 'how' to do a task through active participation is:", options: ["Asymmetrical Information", "Tacit Knowledge", "Explicit Knowledge", "Core Competency"], a: 1, feedback: "Tacit Knowledge requires strong ties, like an equity alliance or joint venture, to transfer effectively." },
        { q: "When managers convince themselves of their superior skills in the face of clear evidence to the contrary (often justifying bad M&As), it is called:", options: ["Confirmation Bias", "Opportunism", "Managerial Hubris", "The Ostrich Effect"], a: 2, feedback: "Managerial Hubris is a form of self-delusion where leaders believe they are the exception to the rule that M&As destroy value." },
        { q: "According to the textbook, what happens to shareholder value in the majority of Mergers and Acquisitions?", options: ["It drastically increases", "It is destroyed", "It remains completely neutral", "It only increases for the acquiring firm"], a: 1, feedback: "Most M&As destroy shareholder value, and any value created generally goes to the firm being taken over." },
        { q: "In the Four Actions Framework, what factor asks which elements an industry takes for granted and should be dropped entirely?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 1, feedback: "Eliminate removes factors that no longer add value." },
        { q: "In the Four Actions Framework, what factor asks which elements should be lowered well below the industry standard?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 0, feedback: "Reduce lowers factors to save costs." },
        { q: "In the Four Actions Framework, what factor asks which elements should be elevated well above the industry standard?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 2, feedback: "Raise increases factors to boost buyer value." },
        { q: "In the Four Actions Framework, what factor asks which elements the industry has never offered before?", options: ["Reduce", "Eliminate", "Raise", "Create"], a: 3, feedback: "Create introduces entirely new value propositions." },
        { q: "In the Blue Ocean Model, where is Value Innovation created?", options: ["Where costs increase and buyer value increases", "Where costs decrease and buyer value increases", "Where costs decrease and buyer value decreases", "Where technology outpaces the market standard"], a: 1, feedback: "Value innovation occurs in the region where a company’s actions simultaneously lower costs and lift buyer value." },
        { q: "Which way of thinking strategically asks 'how', breaks things apart, and goes down the funnel?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 0, feedback: "Analytical thinking is great for red oceans but bad for creativity." },
        { q: "Which way of thinking strategically asks 'Who doesn't know this already?' and sees connections others overlook?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 1, feedback: "Second-Level Thinking involves creative insights and interpreting data in unconventional ways." },
        { q: "Which way of thinking strategically embraces 'Negative Capability' and takes the competitor's point of view?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 2, feedback: "180-Degree Thinking requires humility and the ability to hold two opposed ideas in mind." },
        { q: "Which way of thinking strategically looks at the 'why', goes up the funnel, and focuses on purpose?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 3, feedback: "Systems Thinking evaluates the overall role and purpose of a company within its broader industry." },
        { q: "According to Handy’s Clover, which of the following is NOT one of the three distinct parts used to explain outsourcing?", options: ["Professional Core", "Self-Employed Professionals", "Contingent Workforce", "Platform Ecosystem"], a: 3, feedback: "Handy's Clover (Shamrock Organisation) consists of the Professional Core, Self-Employed Professionals, and the Contingent Workforce." },
        { q: "According to the Smile Strategy (or Smiley Strategy), which process sits in the middle 'dip' because it has the lowest value added?", options: ["Engineering and Design", "Marketing and Supply Chain", "Assembly", "Customer Service"], a: 2, feedback: "In the Smile Strategy, the ends (engineering/design and marketing) have high value added, while the middle (assembly) dips down." },
        { q: "What does the 'A' stand for in the SOAR model?", options: ["Actions", "Aspirations", "Alliances", "Asymmetry"], a: 1, feedback: "SOAR stands for Strengths, Opportunities, Aspirations, Results." },
        { q: "What strategic tool evaluates a company's competitive position by assigning importance to various Success Factors and comparing performance against competitors?", options: ["SOAR Model", "Weighted Competitive Strength Assessment", "BCG Matrix", "Four Actions Framework"], a: 1, feedback: "The Weighted Competitive Strength Assessment mathematically compares firms based on key success factors." },
        { q: "Which type of company is described as the incumbents who built and dominate the industry orthodoxy?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 0, feedback: "Rule Makers create the rules that others follow." },
        { q: "Which type of company is described as paying homage to the industrial lords?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 1, feedback: "Rule Takers follow the established rules of the game." },
        { q: "Which type of company is described as malcontents and revolutionaries who want to overturn the industrial order?", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Rule Shakers"], a: 2, feedback: "Rule Breakers change the rules of the game to create new market spaces." },
    //BANK TWO/
        { q: "Corporate strategy comprises decisions based on three key questions. Which of the following is NOT one of them?", options: ["In what stages of the industry value chain should we participate?", "What range of products and services should we offer?", "Where should we compete geographically?", "How should we price our core products to maximize volume?"], a: 3, feedback: "Corporate strategy focuses on vertical integration, horizontal diversification, and geographic scope[cite: 499, 500, 501]." },
        
        { q: "According to the textbook, firms engage in acquisitions for three main reasons. Which of the following is NOT one of those reasons?", options: ["To access new markets and distribution channels", "To access new capabilities or competencies", "To engage in strategic preemption", "To eliminate the need for functional-level strategies"], a: 3, feedback: "Firms use M&A to access new markets, access new capabilities, or engage in strategic preemption[cite: 542, 543]." },

        { q: "In a study of 108 business launches, what percentage aimed at creating entirely new markets or industries (Blue Oceans)?", options: ["14%", "38%", "61%", "86%"], a: 0, feedback: "Only 14% aimed at creating new markets, but those ventures accounted for 61% of total profits[cite: 71, 72]." },

        { q: "Over time in a Blue Ocean strategy, how are costs reduced even further after the initial value innovation?", options: ["By exploiting supplier bargaining power", "As scale economies kick in due to high sales volumes", "By aggressively increasing horizontal diversification", "By laying off the contingent workforce"], a: 1, feedback: "Over time, costs are reduced further as scale economies kick in due to the high sales volumes that superior value generates[cite: 555]." },

        { q: "What is the typical lifespan of a Blue Ocean before facing credible challenges from competitors?", options: ["1 to 3 years", "5 to 7 years", "10 to 15 years", "20 to 25 years"], a: 2, feedback: "The lifespan of a Blue Ocean without credible challenges is typically 10 to 15 years[cite: 86]." },

        { q: "According to the navigation rules for finding Blue Oceans, 'Rule Breakers' are often described as being mentally under what age?", options: ["30", "40", "50", "60"], a: 1, feedback: "Rule breakers are mentally under 40, supplementing the hierarchy of experience with the hierarchy of imagination[cite: 261, 268]." },

        { q: "John Keats' concept of 'Negative Capability'—the ability to live with mystery and make peace with ambiguity—is a key component of which strategic thinking style?", options: ["Systems Thinking", "180-Degree Thinking", "Analytical Thinking", "Second-Level Thinking"], a: 1, feedback: "Negative Capability and minimizing ego are the two main keys to 180-Degree Thinking[cite: 182, 183, 185, 186, 187]." },

        { q: "When Anita Roddick founded the Body Shop and explicitly decided to 'walk in the opposite direction' of the traditional cosmetics industry, she was acting as a:", options: ["Rule Maker", "Rule Taker", "Rule Breaker", "Platform Ecosystem"], a: 2, feedback: "Rule breakers are subversive and change the rules written by Rule Makers like Revlon[cite: 256, 257, 258, 259, 260]." },

        { q: "Cirque du Soleil created a Blue Ocean by aiming to reinvent the circus. According to their strategy canvas, which of the following elements did they completely ELIMINATE?", options: ["A modern tent", "Acrobatic acts", "Animal acts", "Artistic sophistication"], a: 2, feedback: "Cirque du Soleil eliminated stars, animal acts, concession, and hucksterish sales[cite: 66, 67]." },

        { q: "Before Disneyland opened in 1955, what primary factor were existing theme parks competing on?", options: ["Multi-media experiences", "Thrill rides and rollercoasters", "Theme rides", "Blood, guts, and explosions"], a: 1, feedback: "Theme parks were in a rollercoaster contest before Disneyland changed the format to theme rides[cite: 47, 48]." },

        { q: "Recognizing life's meaningful coincidences with no causal explanation is known as what in the context of Second-Level Thinking?", options: ["Negative Capability", "Synchronicity", "Opportunism", "Hubris"], a: 1, feedback: "Synchronicity is recognizing meaningful coincidences, which reinforces the law of unintended consequences[cite: 156, 159, 160, 162]." },

        { q: "If a firm is forwardly integrated but also relies on outside market firms for some of its distribution, it is utilizing:", options: ["Backward Integration", "Taper Integration", "Unrelated Diversification", "Joint Ventures"], a: 1, feedback: "Taper integration orchestrates value by mixing in-house and outside suppliers or distributors[cite: 510, 511]." },

        { q: "In the Build-Borrow-Buy Framework, what specific question does the 'Tradability' step address?", options: ["How relevant are existing internal resources?", "How well can you integrate a targeted firm?", "How close do you need to be to your external partner?", "How tradable are the targeted resources that may be available externally?"], a: 3, feedback: "Tradability explicitly asks how tradable the targeted resources are that may be available externally[cite: 529]." },

        { q: "In the Build-Borrow-Buy Framework, what specific question does the 'Integration' step address?", options: ["How relevant are existing internal resources?", "How well can you integrate the targeted firm if you determine you need to acquire it?", "How close do you need to be to an external partner?", "How tradable are the targeted resources?"], a: 1, feedback: "Integration asks how well you can integrate the targeted firm if you decide to acquire the resource partner[cite: 531]." },

        { q: "Which of the following strategic moves involves combining two independent firms to form a combined entity and is specifically subject to antitrust concerns?", options: ["Non-equity alliances", "Joint Ventures", "Mergers and Acquisitions", "Platform Businesses"], a: 2, feedback: "Mergers and Acquisitions combine two independent firms and are explicitly subject to antitrust concerns[cite: 538, 539]." },
        //BANK 3
        { q: "If a company decides to target a narrow, specific market niche rather than going after the broader market, it is defining its:", options: ["Strategic Position", "Competitive Scope", "Value Driver", "Economies of Scale"], a: 1, feedback: "Competitive scope is the decision of whether to pursue a specific market niche or go after the broader market." },
        
        { q: "To achieve a true competitive advantage using a differentiation strategy, a firm's increase in value creation must exceed:", options: ["Its market share", "The industry average", "The increase in cost", "Its relative market growth"], a: 2, feedback: "Value drivers contribute to competitive advantage only if their increase in value creation exceeds the increase in cost." },

        { q: "A car manufacturer uses the same robotic arms and factory floor to assemble both sedans and SUVs, lowering its overall production costs for both. This is an example of:", options: ["Value Innovation", "Economies of Scale", "Economies of Scope", "Architectural Innovation"], a: 2, feedback: "Economies of scope are savings that come from producing two or more outputs using the same resources and technology." },

        { q: "A massive microchip factory lowers its per-chip cost simply by producing 10 million chips a month instead of 1 million. This demonstrates:", options: ["Economies of Scope", "Economies of Scale", "Taper Integration", "Platform Strategy"], a: 1, feedback: "Economies of scale are characterized by a decrease in unit cost as output volume increases." },

        { q: "During which stage of the industry life cycle does market growth peak and competition become so intense that weaker firms are forced out?", options: ["Introduction", "Growth", "Shakeout", "Maturity"], a: 2, feedback: "The shakeout stage is where competition intensifies and weaker firms are forced out of the market." },

        { q: "The 'chasm' in the Crossing the Chasm framework is notoriously difficult to cross because it separates which two specific customer segments?", options: ["Technology Enthusiasts and Early Adopters", "Early Adopters and Early Majority", "Early Majority and Late Majority", "Late Majority and Laggards"], a: 1, feedback: "The 'big gulf' or chasm lies specifically between the early adopters and the early majority." },

        { q: "Netflix transitioning from mailing DVDs to streaming content over the internet to its existing customer base is an example of:", options: ["Incremental Innovation", "Radical Innovation", "Architectural Innovation", "Disruptive Innovation"], a: 3, feedback: "Disruptive innovation involves introducing a new technology into an existing market." },

        { q: "A company takes an existing medical sensor technology and reconfigures it to be used in consumer smartwatches for everyday fitness tracking. What type of innovation is this?", options: ["Incremental Innovation", "Radical Innovation", "Architectural Innovation", "Disruptive Innovation"], a: 2, feedback: "Architectural innovation alters the design of a product by putting existing tech/components together in a new way for a new market." },

        { q: "If a smartphone manufacturer decides to stop buying camera lenses from a supplier and starts manufacturing them in-house, it is engaging in:", options: ["Horizontal Diversification", "Unrelated Diversification", "Vertical Integration", "Geographic Scope Expansion"], a: 2, feedback: "Vertical integration answers the corporate strategy question: In what stages of the industry value chain should the company participate?" },

        { q: "Two competing firms find it mutually beneficial to cooperate on a supply chain issue, but one firm suddenly backs out to prevent the other from gaining bargaining power. This is an example of:", options: ["Managerial Hubris", "Hold-up (Opportunism)", "Asymmetrical Information", "Creative Destruction"], a: 1, feedback: "Hold-up is a specific form of opportunism where one party withholds cooperation for self-interest." },

        { q: "Why might a firm choose an Equity Alliance or Joint Venture over a Non-Equity Alliance when trying to learn a complex, experience-based manufacturing process from a partner?", options: ["To share explicit knowledge easily", "To transfer tacit knowledge", "To avoid antitrust concerns", "To minimize financial commitment"], a: 1, feedback: "Tacit knowledge cannot be codified and requires active participation, which is best facilitated by strong ties like equity alliances or joint ventures." },

        { q: "If a massive tech company buys a promising startup simply to shut down its product and prevent it from becoming a future rival, what M&A motive does this represent?", options: ["Accessing new markets", "Accessing new capabilities", "Strategic preemption", "Managerial hubris"], a: 2, feedback: "Strategic preemption is buying a company specifically to neutralize a potential future threat." },

        { q: "In the Build-Borrow-Buy framework, if a firm realizes its internal resources are NOT highly relevant, what is the very next step it evaluates?", options: ["How close they need to be to a partner", "How tradable the targeted external resources are", "How well they can integrate a target firm", "If they should launch a joint venture"], a: 1, feedback: "If internal resources aren't relevant (Build), the next step is assessing Tradability (Borrow via contract)." },

        { q: "In the Four Actions Framework, which two actions are primarily responsible for lowering a company's cost structure?", options: ["Raise and Create", "Eliminate and Raise", "Reduce and Create", "Eliminate and Reduce"], a: 3, feedback: "Cost savings are made by eliminating and reducing the factors an industry currently competes on." },

        { q: "In the Four Actions Framework, which two actions are primarily responsible for lifting buyer value?", options: ["Raise and Create", "Eliminate and Raise", "Reduce and Create", "Eliminate and Reduce"], a: 0, feedback: "Buyer value is lifted by raising existing factors above standard and creating entirely new elements." },

        { q: "If a manager refuses to accept contradictory data because it doesn't comfortably fit into their rational, established business model, they are failing to practice:", options: ["Systems Thinking", "Analytical Thinking", "Negative Capability", "Synchronicity"], a: 2, feedback: "Negative capability is the willingness to embrace uncertainty and contemplate contradictory aspects without forcing them into a closed system." },

        { q: "A mid-level manager tasked with analyzing how to improve the efficiency of a single, specific assembly line step by breaking it apart is most likely using:", options: ["Systems Thinking", "180-Degree Thinking", "Second-Level Thinking", "Analytical Thinking"], a: 3, feedback: "Analytical thinking asks 'how', breaks things apart, and goes down the funnel to solve specific functional problems." },

        { q: "A CEO who asks, 'What is the overarching role of our industry in society, and how does our company fulfill that purpose differently?' is demonstrating:", options: ["Systems Thinking", "180-Degree Thinking", "Second-Level Thinking", "Analytical Thinking"], a: 0, feedback: "Systems thinking focuses on 'why', goes up the funnel, and centers on overarching purpose and roles." },

        { q: "In Handy's Clover (Shamrock Organisation), which leaf represents the critical, highly-skilled workers who possess the firm's core competencies?", options: ["Contingent Workforce", "Self-Employed Professionals", "Professional Core", "Consumers"], a: 2, feedback: "The Professional Core represents the central leaf where a company focuses its attention and resources on its core competencies." },

        { q: "According to Handy’s Clover, routine tasks like standard IT maintenance or janitorial services would most likely be handled by:", options: ["The Professional Core", "The Contingent Workforce (Outsourced)", "Platform Consumers", "The Rule Makers"], a: 1, feedback: "The contingent workforce/outsourced services represent the leaves of the clover outside of the professional core." },

        { q: "In the Smile Strategy (or Smiley Strategy), activities like advanced R&D, engineering, and brand marketing are positioned where on the curve?", options: ["At the low dip in the middle", "At the high ends of the smile", "Along the x-axis exclusively", "Scattered randomly"], a: 1, feedback: "The two ends (early processes like R&D and late processes like marketing) have high value added, forming the high points of the smile." },

        { q: "Unlike a traditional SWOT analysis that focuses heavily on weaknesses and threats, the SOAR model focuses on Strengths, Aspirations, Results, and:", options: ["Overheads", "Opportunities", "Operations", "Objectives"], a: 1, feedback: "SOAR stands for Strengths, Opportunities, Aspirations, and Results." },

        { q: "Uber entering the taxi industry and completely ignoring the established medallion system and traditional dispatch rules makes them a classic example of a:", options: ["Rule Maker", "Rule Taker", "Rule Breaker", "Rule Shaker"], a: 2, feedback: "Rule Breakers are revolutionaries who want to overturn the industrial order and change the rules of the game." },

        { q: "A regional credit union that simply copies the fee structures, marketing tactics, and mobile app features of massive national banks is acting as a:", options: ["Rule Maker", "Rule Taker", "Rule Breaker", "Rule Shaker"], a: 1, feedback: "Rule Takers pay homage to the industrial lords by following the rules written by others." },

        { q: "What strategic tool assigns mathematical importance to various industry Success Factors so a firm can objectively compare its performance against rivals?", options: ["Strategy Canvas", "BCG Matrix", "Weighted Competitive Strength Assessment", "Build-Borrow-Buy Framework"], a: 2, feedback: "The Weighted Competitive Strength Assessment evaluates competitive position by assigning weight/importance to various Success Factors." },
//BANK 4
        // BUSINESS STRATEGY & COMPETITIVE ADVANTAGE (Ch 6)
        { q: "A drone manufacturer decides to stop competing on price and instead adds advanced AI obstacle avoidance and cinematic color profiles to its cameras. What strategy is it pursuing?", options: ["Cost Leadership", "Differentiation", "Platform Strategy", "Unrelated Diversification"], a: 1, feedback: "Differentiation focuses on adding unique value drivers (like advanced tech and features) so customers will pay a premium." },
        { q: "A mechanical engineering firm realizes that as it scales up production of a specific valve from 1,000 to 100,000 units, its cost per unit drops significantly. What is this called?", options: ["Economies of Scope", "Network Effects", "Value Innovation", "Economies of Scale"], a: 3, feedback: "Economies of scale occur when the unit cost decreases as output volume increases." },
        { q: "If that same engineering firm uses its existing robotic assembly line to produce both valves and specialized drone propellers at a lower cost than producing them in separate facilities, this demonstrates:", options: ["Economies of Scale", "Economies of Scope", "Taper Integration", "Architectural Innovation"], a: 1, feedback: "Economies of scope are savings from producing multiple different outputs using the same resources and technology." },
        { q: "When a firm creates a gap between the value its product generates and the cost required to produce it, and that gap is larger than its competitors' gaps, the firm has achieved:", options: ["A Blue Ocean", "Managerial Hubris", "Competitive Advantage", "A Cash Cow"], a: 2, feedback: "Competitive advantage is achieved when a firm's value creation exceeds its costs by a wider margin than rivals." },
        { q: "If a boutique coffee shop focuses exclusively on serving highly specialized, pour-over coffees to extreme coffee enthusiasts in a single neighborhood, its competitive scope is:", options: ["Broad", "Narrow", "Blue Ocean", "Horizontal"], a: 1, feedback: "A narrow competitive scope targets a specific market niche rather than the broader mass market." },
        { q: "A firm attempting a Blue Ocean strategy fails to reconcile the trade-offs between cost and differentiation, ending up with a product that is neither cheap nor unique. This firm is:", options: ["Stuck in the middle", "Crossing the chasm", "A Rule Breaker", "A Platform Business"], a: 0, feedback: "Firms that fail to achieve value innovation often end up 'stuck in the middle' with no clear strategic position." },
        { q: "Which of the following is NOT typically considered a 'Value Driver' in a differentiation strategy?", options: ["Product Features", "Customer Service", "Massive Production Volume", "Complements"], a: 2, feedback: "Massive production volume drives cost leadership (economies of scale), not differentiation." },
        { q: "When plotting a Strategy Canvas, what goes on the horizontal axis?", options: ["Price only", "Market share", "The industry's key success factors", "Time"], a: 2, feedback: "The horizontal axis of a Strategy Canvas captures the range of factors the industry competes on and invests in." },

        // INNOVATION & INDUSTRY LIFE CYCLE (Ch 7)
        { q: "A videographer adopts a brand-new AI editing software that uses entirely new code to replace traditional timeline editing, completely altering the video production market. What type of innovation is this?", options: ["Incremental", "Radical", "Architectural", "Disruptive"], a: 1, feedback: "Radical innovation combines entirely new technologies with new markets." },
        { q: "A company takes the lightweight carbon-fiber technology used in aerospace and applies it to create a new market for ultra-lightweight downhill skis. This is an example of:", options: ["Incremental Innovation", "Radical Innovation", "Architectural Innovation", "Disruptive Innovation"], a: 2, feedback: "Architectural innovation reconfigures existing technologies/components for a new market." },
        { q: "Gillette releasing a razor with five blades instead of four to its existing customer base is a classic example of:", options: ["Incremental Innovation", "Radical Innovation", "Architectural Innovation", "Disruptive Innovation"], a: 0, feedback: "Incremental innovation builds on established knowledge to improve an existing product for an existing market." },
        { q: "Which customer group in the industry life cycle enters the market during the 'Growth' stage and relies heavily on endorsements from early adopters?", options: ["Technology Enthusiasts", "Early Majority", "Late Majority", "Laggards"], a: 1, feedback: "The Early Majority enters during the growth stage and represents a large, practical-minded segment." },
        { q: "During the 'Decline' stage of an industry, a firm decides to stop investing in marketing and simply rides out the remaining product sales to extract cash. This strategy is called:", options: ["Divesting", "Harvesting", "Maintaining", "Consolidating"], a: 1, feedback: "Harvesting involves reducing investments to a minimum while continuing to extract revenues." },
        { q: "What is the primary characteristic that separates a Platform Business from a traditional Pipeline Business?", options: ["It manufactures goods cheaper", "It relies on network effects to match producers and consumers", "It has higher physical assets", "It only operates locally"], a: 1, feedback: "Platform businesses create value by matching external producers and consumers via an infrastructure." },
        { q: "In the 1990s, digital cameras began destroying the film photography market, forcing legacy firms like Kodak to adapt or die. This economic process is known as:", options: ["Managerial Hubris", "Crossing the Chasm", "Creative Destruction", "Taper Integration"], a: 2, feedback: "Creative destruction is the process where new innovations replace older ones, driving industry evolution." },

        // CORPORATE STRATEGY (Ch 8)
        { q: "A major ski resort decides to purchase the real estate company that builds the lodges, the bus company that shuttles guests, and the food distributor that stocks its cafeterias. This represents:", options: ["Horizontal Diversification", "Unrelated Diversification", "Vertical Integration", "Geographic Scope"], a: 2, feedback: "Vertical integration involves expanding participation into different stages of the industry value chain." },
        { q: "If a software company decides to acquire a fast-food restaurant chain, this is an example of:", options: ["Related Diversification", "Unrelated Diversification", "Vertical Integration", "Taper Integration"], a: 1, feedback: "Unrelated diversification occurs when the businesses driving revenue share few to no linkages." },
        { q: "A large university relies on its own internal maintenance staff for day-to-day cleaning, but hires an outside contracting firm for major landscaping projects. This mix of in-house and outside supply is called:", options: ["Related Diversification", "Taper Integration", "Strategic Alliance", "Horizontal Integration"], a: 1, feedback: "Taper integration orchestrates value by relying on both in-house capabilities and outside market firms." },
        { q: "According to the BCG Matrix, a business unit that has a very high market share but operates in a dying, low-growth industry should be treated as a:", options: ["Star", "Cash Cow", "Question Mark", "Dog"], a: 1, feedback: "Cash Cows operate in low-growth markets but hold high market share, generating cash to be used elsewhere." },
        { q: "A supplier realizes a manufacturer desperately needs a specific part to finish production and immediately doubles the price, acting with self-interest and guile. This behavior is:", options: ["Managerial Hubris", "Tacit Knowledge", "Opportunism", "Creative Destruction"], a: 2, feedback: "Opportunism (specifically 'hold-up') is self-interest seeking with guile." },
        { q: "When negotiating a contract, a corporate consultant knows the exact minimum price their firm will accept, but the client does not. This imbalance is known as:", options: ["Managerial Hubris", "Asymmetrical Information", "Tacit Knowledge", "Systemic Thinking"], a: 1, feedback: "Asymmetrical information occurs when one party possesses private information the other does not." },
        { q: "If Disney decides to launch its streaming service in Europe and Asia after succeeding in the US, which corporate strategy question is it addressing?", options: ["Vertical Integration", "Horizontal Diversification", "Geographic Scope", "Blue Ocean positioning"], a: 2, feedback: "Geographic scope determines where the company competes regionally, nationally, or internationally." },

        // ALLIANCES & ACQUISITIONS (Ch 9)
        { q: "A firm wants to learn the highly complex, hands-on techniques of a Japanese manufacturing partner. Because this knowledge cannot be easily written down, it requires a strong tie. This type of knowledge is:", options: ["Explicit Knowledge", "Tacit Knowledge", "Asymmetrical Information", "Opportunistic Data"], a: 1, feedback: "Tacit knowledge concerns knowing 'how' to do a task and requires active participation to acquire." },
        { q: "Under the Build-Borrow-Buy framework, if a firm determines it needs to be extremely close to an external partner to succeed, what should it do?", options: ["Borrow (Short-term contract)", "Buy (Acquisition)", "Build (Internal development)", "Divest"], a: 1, feedback: "If a firm needs extreme closeness and integration with a partner, the framework suggests 'Buy' (Acquisition)." },
        { q: "Instead of committing $100 million to a new technology immediately, a firm invests $5 million in a pilot program to see if it works, reserving the right to invest the rest later. This uses the:", options: ["Real-Options Perspective", "BCG Matrix", "Smile Strategy", "Four Actions Framework"], a: 0, feedback: "The real-options perspective treats decisions like stock options, breaking large investments into smaller steps over time." },
        { q: "Facebook purchasing Instagram in its early days specifically to prevent it from becoming a major competitor is an example of:", options: ["Accessing new distribution channels", "Managerial hubris", "Strategic preemption", "Taper integration"], a: 2, feedback: "Strategic preemption involves acquiring a firm to neutralize a potential future threat." },
        { q: "A CEO pushes through a massive acquisition despite warnings from analysts that the cultures will clash, falsely believing their superior leadership can fix any problem. This is:", options: ["Confirmation Bias", "Managerial Hubris", "Opportunism", "Second-Level Thinking"], a: 1, feedback: "Managerial hubris is a form of self-delusion regarding superior skills, often leading to value-destroying acquisitions." },
        { q: "When two independent firms agree to create a brand new, third legally independent entity to share resources and risks, they have formed a:", options: ["Non-equity alliance", "Equity alliance", "Joint Venture", "Merger"], a: 2, feedback: "A Joint Venture is the strongest strategic alliance, involving the creation of an entirely new entity." },
        { q: "Which type of strategic alliance is based solely on contracts, making it flexible but weak for transferring tacit knowledge?", options: ["Non-equity alliance", "Equity alliance", "Joint Venture", "Acquisition"], a: 0, feedback: "Non-equity alliances are governed by contracts (like licensing agreements) and are best for sharing explicit knowledge." },

        // BLUE OCEAN & VALUE ADDED MATERIAL
        { q: "A consulting firm relies heavily on freelancers and independent contractors for specific project roles rather than hiring full-time employees. In Handy’s Clover, this group is the:", options: ["Professional Core", "Contingent Workforce", "Rule Makers", "Laggards"], a: 1, feedback: "The Contingent Workforce makes up one of the leaves of the clover, representing outsourced or freelance labor." },
        { q: "According to the Smile Strategy, which two business functions typically command the highest value-added margins (the 'peaks' of the smile)?", options: ["Assembly and Packaging", "R&D/Design and Marketing/Sales", "Supply Chain and Logistics", "HR and Accounting"], a: 1, feedback: "The early processes (engineering/design) and late processes (marketing) hold the highest value added." },
        { q: "You are analyzing a business problem. Instead of asking 'how does this mechanism work?', you step back and ask 'Why does this industry exist, and what is our purpose within it?' You are using:", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 3, feedback: "Systems thinking asks 'why', moves up the funnel, and focuses on overarching purpose." },
        { q: "F. Scott Fitzgerald said, 'The test of a first-rate intelligence is the ability to hold two opposed ideas in mind at the same time.' Which strategic thinking style relies on this concept?", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 2, feedback: "180-Degree Thinking requires negative capability and the ability to view the world from the competitor's point of view." },
        { q: "When a manager relies solely on breaking a problem down into its functional parts and focusing heavily on metrics and 'how-to's, they are using:", options: ["Analytical Thinking", "Second-Level Thinking", "180-Degree Thinking", "Systems Thinking"], a: 0, feedback: "Analytical thinking is highly functional and problematic, going down the funnel." },
        { q: "Which strategic tool is an inversion of the traditional SWOT analysis, often sold by consultants as a 'new' framework?", options: ["SOAR Analysis", "TOWS Analysis", "PESTEL Analysis", "VRIO Framework"], a: 1, feedback: "TOWS is simply an inversion of the SWOT acronym (Threats, Opportunities, Weaknesses, Strengths)." },
        { q: "Which of the following best describes 'Rule Takers' in an industry?", options: ["They write the industry orthodoxy", "They challenge conventions and break boundaries", "They pay homage to the industrial lords and play by the existing rules", "They focus exclusively on unrelated diversification"], a: 2, feedback: "Rule Takers follow the established norms and rules created by the Rule Makers." },
        { q: "Companies like Zoom, Robinhood, and OpenAI that actively subvert existing industry structures and target mentally younger demographics are acting as:", options: ["Rule Makers", "Rule Takers", "Rule Breakers", "Cash Cows"], a: 2, feedback: "Rule Breakers are the malcontents and revolutionaries overturning the industrial order." },
        { q: "In the Four Actions framework, the goal of 'Creating' and 'Raising' is specifically designed to achieve what part of Value Innovation?", options: ["Decreasing the cost structure", "Lifting buyer value", "Eliminating industry rivals", "Expanding geographic scope"], a: 1, feedback: "Raising existing standards and creating new elements directly lifts the value proposition to buyers." },
        { q: "In the Four Actions framework, the goal of 'Eliminating' and 'Reducing' is specifically designed to achieve what part of Value Innovation?", options: ["Lifting buyer value", "Lowering the cost structure", "Increasing market share", "Satisfying early adopters"], a: 1, feedback: "Eliminating taken-for-granted features and reducing over-engineered elements lowers the firm's cost structure." },

        // MIXED SCENARIO DRILLS
        { q: "A college student starts a business matching freelance drone pilots with real estate agents. The student doesn't own any drones or real estate. What is this business model?", options: ["Vertical Integration", "Pipeline Business", "Platform Strategy", "Joint Venture"], a: 2, feedback: "A Platform Strategy creates value by managing the infrastructure that connects external producers and consumers." },
        { q: "A traditional bank refuses to invest in mobile-check depositing because they believe customers will always want to visit physical branches. They are ignoring the threat of:", options: ["Creative Destruction", "Managerial Hubris", "Economies of Scale", "Tacit Knowledge"], a: 0, feedback: "Creative destruction is the threat of new innovations rendering legacy business models obsolete." },
        { q: "A corporate leader allocates exactly 10% of the budget to every department, regardless of their performance or strategic importance. What concept from the first half of the class does this describe?", options: ["Peanut Butter Allocation", "Value Innovation", "Second-Level Thinking", "Taper Integration"], a: 0, feedback: "Peanut butter allocation spreads resources evenly across the board rather than making hard strategic choices." },
        { q: "If a company successfully identifies a Blue Ocean, how long can they generally expect to operate without facing a credible challenge from competitors?", options: ["1-2 years", "10-15 years", "20-30 years", "Forever"], a: 1, feedback: "The lifespan of a Blue Ocean without credible challenges is generally 10 to 15 years." },
        { q: "The University of Alabama deciding to offer a new degree in Data Analytics utilizing its existing faculty and campus resources is an example of leveraging resources for:", options: ["Competitive Advantage", "Managerial Hubris", "Asymmetrical Information", "Opportunism"], a: 0, feedback: "Leveraging resources effectively is the basis for establishing and sustaining a competitive advantage." },
        { q: "When analyzing a strategic group map, what separates one group of competitors from another?", options: ["Geographic Scope", "Mobility Barriers", "Tacit Knowledge", "Asymmetrical Information"], a: 1, feedback: "Mobility barriers are industry-specific factors that make it difficult for a firm to move from one strategic group to another." },
        { q: "If you are using the SOAR model to formulate a strategic plan, you are focusing on Strengths, Opportunities, Results, and:", options: ["Actions", "Aspirations", "Asymmetries", "Alliances"], a: 1, feedback: "The 'A' in SOAR stands for Aspirations." },
        { q: "Which of the following represents 'Explicit Knowledge' rather than 'Tacit Knowledge'?", options: ["The muscle memory required to ride a bike", "The intuition of a master chef", "A printed user manual for a piece of software", "The leadership style of a CEO"], a: 2, feedback: "Explicit knowledge can be codified and written down, whereas tacit knowledge requires experience and active participation." },
        { q: "When Disney shifted the theme park format away from terrifying thrill rides to family-friendly multi-media theme rides, they were acting as a:", options: ["Rule Maker", "Rule Taker", "Rule Breaker", "Laggard"], a: 2, feedback: "Disney acted as a Rule Breaker by completely changing the format and rules of the theme park industry." },
        { q: "Cirque du Soleil successfully found a Blue Ocean by operating in the uncontested space between what two existing industries?", options: ["Theatre and Circus", "Movies and Live Music", "Amusement Parks and Zoos", "Ballet and Gymnastics"], a: 0, feedback: "Cirque du Soleil found their Blue Ocean in the space between the traditional circus and sophisticated theatre." }
    ];

    let currentQIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;
    let shuffledQuestions = [];

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function initQuiz() {
        shuffledQuestions = shuffleArray([...allQuestions]); 
        document.getElementById('total-qs').innerText = shuffledQuestions.length;
        loadQuestion();
    }

    function loadQuestion() {
        // Reset animation
        const animWrapper = document.getElementById('anim-wrapper');
        animWrapper.classList.remove('fade-enter');
        void animWrapper.offsetWidth; // trigger reflow
        animWrapper.classList.add('fade-enter');

        const qObj = shuffledQuestions[currentQIndex];
        document.getElementById('question-text').innerText = `Question ${currentQIndex + 1} of ${shuffledQuestions.length}: \n${qObj.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.className = 'feedback-container';
        document.getElementById('next-btn').style.display = 'none';

        let optionsWithIndex = qObj.options.map((opt, i) => ({ text: opt, originalIndex: i }));
        let shuffledOpts = shuffleArray(optionsWithIndex);

        shuffledOpts.forEach((optObj) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optObj.text;
            btn.onclick = () => selectAnswer(btn, optObj.originalIndex, qObj.a, qObj.feedback, shuffledOpts);
            optionsContainer.appendChild(btn);
        });

        const progressPct = ((currentQIndex) / shuffledQuestions.length) * 100;
        document.getElementById('progress').style.width = progressPct + '%';
    }

    function selectAnswer(selectedBtn, selectedIndex, correctIndex, feedbackText, shuffledOpts) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true); 

        const feedbackDiv = document.getElementById('feedback');
        
        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add('correct');
            correctCount++;
            document.getElementById('score-correct').innerText = correctCount;
            feedbackDiv.innerHTML = `<strong>Correct!</strong> ${feedbackText}`;
            feedbackDiv.className = 'feedback-container show success';
        } else {
            selectedBtn.classList.add('incorrect');
            incorrectCount++;
            document.getElementById('score-incorrect').innerText = incorrectCount;
            
            allBtns.forEach((btn, idx) => {
                if(shuffledOpts[idx].originalIndex === correctIndex) {
                    btn.classList.add('correct');
                }
            });
            feedbackDiv.innerHTML = `<strong>Incorrect.</strong> ${feedbackText}`;
            feedbackDiv.className = 'feedback-container show error';
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('quiz-header').style.display = 'none';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('q-container').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        
        const endScreen = document.getElementById('end-screen');
        endScreen.style.display = 'block';
        document.getElementById('final-score').innerText = correctCount;
        document.getElementById('final-wrong').innerText = incorrectCount;
    }

    window.onload = initQuiz;
</script>
